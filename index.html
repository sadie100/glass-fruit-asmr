<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Fruit ASMR Slicer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', sans-serif;
      cursor: none;
      user-select: none;
    }
    canvas { display: block; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #title {
      position: fixed;
      top: 30px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.15);
      font-size: 14px;
      letter-spacing: 8px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
    }

    #fruit-selector {
      position: fixed;
      bottom: 30px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 20;
    }
    .fruit-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      pointer-events: all;
    }
    .fruit-btn:hover, .fruit-btn.active {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.12);
      transform: scale(1.1);
    }

    #slash-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 15;
    }

    #custom-cursor {
      position: fixed;
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      transform: translate(-50%, -50%);
      transition: width 0.15s, height 0.15s, border-color 0.15s;
    }
    #custom-cursor.slicing {
      width: 12px; height: 12px;
      border-color: rgba(255,200,200,0.9);
      box-shadow: 0 0 15px rgba(255,150,150,0.4);
    }

    #hint {
      position: fixed;
      bottom: 100px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
      letter-spacing: 3px;
      pointer-events: none;
      z-index: 10;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    #score {
      position: fixed;
      top: 60px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.1);
      font-size: 48px;
      font-weight: 200;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="title">Glass Fruit ASMR</div>
  <div id="score">0</div>
  <div id="hint">드래그하여 과일을 자르세요</div>
  <canvas id="slash-canvas"></canvas>
  <div id="custom-cursor"></div>

  <div id="fruit-selector">
    <button class="fruit-btn active" data-fruit="apple" title="사과">🍎</button>
    <button class="fruit-btn" data-fruit="orange" title="오렌지">🍊</button>
    <button class="fruit-btn" data-fruit="grape" title="포도">🍇</button>
    <button class="fruit-btn" data-fruit="watermelon" title="수박">🍉</button>
    <button class="fruit-btn" data-fruit="strawberry" title="딸기">🍓</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ─── Audio System (Procedural ASMR) ───
    const FRUIT_AUDIO_PARAMS = {
      apple:      { baseFreq: 2200, resonance: 0.7, color: 0.8 },
      orange:     { baseFreq: 1800, resonance: 0.5, color: 0.6 },
      grape:      { baseFreq: 3200, resonance: 0.9, color: 1.0 },
      watermelon: { baseFreq: 800,  resonance: 0.3, color: 0.4 },
      strawberry: { baseFreq: 2800, resonance: 0.8, color: 0.9 },
    };

    class ASMRAudio {
      constructor() {
        this.ctx = null;
        this.masterGain = null;
        this.reverbNode = null;
        this.initialized = false;
        this.ambientStarted = false;
      }

      async init() {
        if (this.initialized) return;
        this.ctx = new AudioContext();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.6;

        // Create reverb via convolution
        this.reverbNode = this.ctx.createConvolver();
        const rate = this.ctx.sampleRate;
        const length = rate * 3;
        const impulse = this.ctx.createBuffer(2, length, rate);
        for (let ch = 0; ch < 2; ch++) {
          const data = impulse.getChannelData(ch);
          for (let i = 0; i < length; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
          }
        }
        this.reverbNode.buffer = impulse;

        const reverbGain = this.ctx.createGain();
        reverbGain.gain.value = 0.3;
        this.reverbNode.connect(reverbGain);
        reverbGain.connect(this.masterGain);
        this.masterGain.connect(this.ctx.destination);
        this.initialized = true;
      }

      // Glass slice sound — the main ASMR effect
      playSlice(speed = 1, fruitType = 'apple', volume = 1.0) {
        if (!this.initialized) return;
        const ctx = this.ctx;
        const now = ctx.currentTime;
        const params = FRUIT_AUDIO_PARAMS[fruitType] || FRUIT_AUDIO_PARAMS.apple;

        // Layer 1: Glass cracking / cutting tone
        this._glassSliceLayer(now, params, speed, volume);
        // Layer 2: Crystal resonance
        this._crystalResonance(now, params, speed, volume);
        // Layer 3: Tiny shards falling
        this._shardTinkle(now, params, speed, volume);
      }

      _glassSliceLayer(now, params, speed, volume = 1.0) {
        const ctx = this.ctx;
        const duration = 0.4 / Math.max(speed, 0.5);

        // Filtered noise — sounds like glass scraping
        const bufferSize = ctx.sampleRate * duration;
        const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1);
        }

        const noise = ctx.createBufferSource();
        noise.buffer = noiseBuffer;

        const bandpass = ctx.createBiquadFilter();
        bandpass.type = 'bandpass';
        bandpass.frequency.setValueAtTime(params.baseFreq, now);
        bandpass.frequency.exponentialRampToValueAtTime(params.baseFreq * 1.5, now + duration);
        bandpass.Q.value = 5 + params.resonance * 15;

        const highpass = ctx.createBiquadFilter();
        highpass.type = 'highpass';
        highpass.frequency.value = 1000;

        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.15 * volume, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        noise.connect(bandpass).connect(highpass).connect(gain);
        gain.connect(this.masterGain);
        gain.connect(this.reverbNode);
        noise.start(now);
        noise.stop(now + duration);
      }

      _crystalResonance(now, params, speed, volume = 1.0) {
        const ctx = this.ctx;
        const duration = 1.5 + params.resonance;

        // Multiple sine harmonics for crystal bell sound
        const fundamentals = [
          params.baseFreq * 0.5,
          params.baseFreq,
          params.baseFreq * 1.5,
          params.baseFreq * 2.2,
        ];

        fundamentals.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + 0.05);
          osc.frequency.exponentialRampToValueAtTime(freq * 0.98, now + duration);

          const gain = ctx.createGain();
          const vol = (0.06 / (i + 1)) * volume;
          gain.gain.setValueAtTime(0, now + 0.05);
          gain.gain.linearRampToValueAtTime(vol, now + 0.08);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

          osc.connect(gain);
          gain.connect(this.masterGain);
          gain.connect(this.reverbNode);
          osc.start(now + 0.05);
          osc.stop(now + duration);
        });
      }

      _shardTinkle(now, params, speed, volume = 1.0) {
        const ctx = this.ctx;
        const numShards = 3 + Math.floor(Math.random() * 5);

        for (let i = 0; i < numShards; i++) {
          const delay = 0.1 + Math.random() * 0.6;
          const freq = params.baseFreq * (1.5 + Math.random() * 2);
          const duration = 0.05 + Math.random() * 0.15;

          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + delay);

          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0, now + delay);
          gain.gain.linearRampToValueAtTime(0.03 * volume, now + delay + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + duration);

          osc.connect(gain);
          gain.connect(this.masterGain);
          gain.connect(this.reverbNode);
          osc.start(now + delay);
          osc.stop(now + delay + duration);
        }
      }

      // Shard landing sounds
      playShardLand() {
        if (!this.initialized) return;
        const ctx = this.ctx;
        const now = ctx.currentTime;
        const freq = 3000 + Math.random() * 4000;
        const duration = 0.03 + Math.random() * 0.05;

        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;

        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.02, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        osc.connect(gain).connect(this.masterGain);
        osc.start(now);
        osc.stop(now + duration);
      }

      // Tap sound (§9.4)
      playTap(fruitType = 'apple') {
        if (!this.initialized) return;
        const ctx = this.ctx;
        const now = ctx.currentTime;
        const params = FRUIT_AUDIO_PARAMS[fruitType] || FRUIT_AUDIO_PARAMS.apple;
        const pitchRand = 0.9 + Math.random() * 0.2; // ±10%

        // Glass Tap: short sine at baseFreq × 1.2
        const tapFreq = params.baseFreq * 1.2 * pitchRand;
        const tapDur = 0.08 + Math.random() * 0.04;
        const osc1 = ctx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.value = tapFreq;
        const gain1 = ctx.createGain();
        gain1.gain.setValueAtTime(0.15, now);
        gain1.gain.exponentialRampToValueAtTime(0.0001, now + tapDur);
        osc1.connect(gain1);
        gain1.connect(this.masterGain);
        gain1.connect(this.reverbNode);
        osc1.start(now);
        osc1.stop(now + tapDur);

        // Resonance Tail: baseFreq sine, decay proportional to resonance
        const tailFreq = params.baseFreq * pitchRand;
        const tailDur = 0.1 + params.resonance * 0.3;
        const osc2 = ctx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.value = tailFreq;
        const gain2 = ctx.createGain();
        gain2.gain.setValueAtTime(0.08, now);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + tailDur);
        osc2.connect(gain2);
        gain2.connect(this.masterGain);
        gain2.connect(this.reverbNode);
        osc2.start(now);
        osc2.stop(now + tailDur);
      }

      // Spawn sound (§11.1): gentle glass resonance
      playSpawn(fruitType = 'apple') {
        if (!this.initialized) return;
        const ctx = this.ctx;
        const now = ctx.currentTime;
        const freq = (FRUIT_AUDIO_PARAMS[fruitType] || FRUIT_AUDIO_PARAMS.apple).baseFreq * 0.5;
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.06, now + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
        osc.connect(gain);
        gain.connect(this.masterGain);
        gain.connect(this.reverbNode);
        osc.start(now);
        osc.stop(now + 0.3);
      }

      // Ambient hum (called once)
      playAmbient() {
        if (!this.initialized || this.ambientStarted) return;
        this.ambientStarted = true;
        const ctx = this.ctx;
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 60;

        const gain = ctx.createGain();
        gain.gain.value = 0.008;

        osc.connect(gain).connect(this.masterGain);
        osc.start();
        return { stop: () => { gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1); } };
      }
    }

    // ─── Fruit Definitions ───
    const FRUITS = {
      apple: {
        name: '사과',
        color: new THREE.Color(0.9, 0.15, 0.12),
        innerColor: new THREE.Color(1.0, 0.95, 0.85),
        size: 1.0,
        geometry: () => {
          const g = new THREE.SphereGeometry(1, 48, 48);
          const pos = g.attributes.position;
          for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
            const r = Math.sqrt(x*x + z*z);
            // Apple dip at top
            if (y > 0.6) {
              const t = (y - 0.6) / 0.4;
              y -= t * t * 0.3;
              const squeeze = 1 - t * 0.15;
              x *= squeeze; z *= squeeze;
            }
            // Slight bulge
            const bulge = 1 + 0.08 * Math.sin(y * Math.PI);
            pos.setXYZ(i, x * bulge, y, z * bulge);
          }
          g.computeVertexNormals();
          return g;
        }
      },
      orange: {
        name: '오렌지',
        color: new THREE.Color(1.0, 0.55, 0.05),
        innerColor: new THREE.Color(1.0, 0.8, 0.4),
        size: 1.0,
        geometry: () => new THREE.SphereGeometry(1, 48, 48),
      },
      grape: {
        name: '포도',
        color: new THREE.Color(0.4, 0.1, 0.5),
        innerColor: new THREE.Color(0.7, 0.5, 0.8),
        size: 0.5,
        geometry: () => new THREE.SphereGeometry(1, 32, 32),
        cluster: true,
        clusterCount: 12,
      },
      watermelon: {
        name: '수박',
        color: new THREE.Color(0.15, 0.55, 0.2),
        innerColor: new THREE.Color(0.95, 0.25, 0.2),
        size: 1.2,
        geometry: () => {
          const g = new THREE.SphereGeometry(1, 48, 48);
          const pos = g.attributes.position;
          for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
            pos.setXYZ(i, x * 1.2, y * 0.85, z);
          }
          g.computeVertexNormals();
          return g;
        }
      },
      strawberry: {
        name: '딸기',
        color: new THREE.Color(0.9, 0.1, 0.15),
        innerColor: new THREE.Color(1.0, 0.7, 0.7),
        size: 0.7,
        geometry: () => {
          const g = new THREE.ConeGeometry(0.7, 1.4, 32);
          g.rotateX(Math.PI);
          const pos = g.attributes.position;
          for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
            const t = (y + 0.7) / 1.4;
            const bulge = 1 + 0.2 * Math.sin(t * Math.PI);
            pos.setXYZ(i, x * bulge, y, z * bulge);
          }
          g.computeVertexNormals();
          return g;
        }
      },
    };

    // ─── Glass Shader ───
    const glassVertexShader = `
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      varying vec3 vViewDir;
      varying vec2 vUv;

      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPos = worldPos.xyz;
        vViewDir = normalize(cameraPosition - worldPos.xyz);
        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `;

    const glassFragmentShader = `
      uniform vec3 uColor;
      uniform float uOpacity;
      uniform float uFresnelPower;
      uniform float uTime;

      varying vec3 vNormal;
      varying vec3 vWorldPos;
      varying vec3 vViewDir;
      varying vec2 vUv;

      void main() {
        // Fresnel effect
        float fresnel = pow(1.0 - max(dot(vViewDir, vNormal), 0.0), uFresnelPower);

        // Base glass color with transparency
        vec3 glassColor = uColor * 0.6 + vec3(0.4);

        // Specular highlights
        vec3 lightDir = normalize(vec3(2.0, 3.0, 1.0));
        vec3 halfDir = normalize(lightDir + vViewDir);
        float spec = pow(max(dot(vNormal, halfDir), 0.0), 80.0);

        vec3 lightDir2 = normalize(vec3(-1.0, 2.0, -2.0));
        vec3 halfDir2 = normalize(lightDir2 + vViewDir);
        float spec2 = pow(max(dot(vNormal, halfDir2), 0.0), 60.0);

        // Combine
        vec3 finalColor = glassColor * (0.3 + fresnel * 0.5);
        finalColor += vec3(1.0) * spec * 0.8;
        finalColor += vec3(0.8, 0.85, 1.0) * spec2 * 0.4;

        // Subtle internal glow
        float glow = sin(vUv.y * 6.28 + uTime * 0.5) * 0.02 + 0.02;
        finalColor += uColor * glow;

        float alpha = mix(uOpacity, 1.0, fresnel * 0.6) + spec * 0.5;
        gl_FragColor = vec4(finalColor, clamp(alpha, 0.0, 0.95));
      }
    `;

    // Cross-section shader for cut surfaces
    const crossSectionFragShader = `
      uniform vec3 uInnerColor;
      uniform float uTime;
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vViewDir;

      void main() {
        vec2 center = vUv - 0.5;
        float dist = length(center);
        float ring = sin(dist * 20.0) * 0.5 + 0.5;

        // Vivid inner color with strong emission
        vec3 brightInner = uInnerColor * 2.0;
        vec3 col = mix(brightInner, brightInner * 0.6, ring * 0.4);

        // Bright center glow
        float centerGlow = 1.0 - smoothstep(0.0, 0.5, dist);
        col += uInnerColor * centerGlow * 0.8;

        // Strong fresnel glow at edges
        float fresnel = pow(1.0 - max(dot(normalize(vViewDir), normalize(vNormal)), 0.0), 1.2);
        col += vec3(0.8) * fresnel;

        float shimmer = sin(vUv.x * 25.0 + uTime * 2.0) * sin(vUv.y * 25.0 + uTime * 1.4) * 0.12;
        col += shimmer;

        // Pulsing glow
        col += uInnerColor * 0.15 * (sin(uTime * 3.0) * 0.5 + 0.5);

        gl_FragColor = vec4(col, 1.0);
      }
    `;

    const capVertexShader = `
      varying vec2 vUv;
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vViewDir = normalize(cameraPosition - wp.xyz);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `;

    // ─── Scene Setup ───
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080810);
    scene.fog = new THREE.FogExp2(0x080810, 0.08);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    renderer.localClippingEnabled = true;
    document.body.prepend(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = false;
    controls.maxDistance = 10;
    controls.minDistance = 2;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x223344, 0.5);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    mainLight.position.set(3, 5, 2);
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    const rimLight = new THREE.PointLight(0xff6644, 0.6, 20);
    rimLight.position.set(0, -2, 3);
    scene.add(rimLight);

    // Ground plane (reflective dark surface)
    const groundGeo = new THREE.PlaneGeometry(30, 30);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x111118,
      roughness: 0.15,
      metalness: 0.8,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -1.5;
    scene.add(ground);

    // ─── Slash trail canvas ───
    const slashCanvas = document.getElementById('slash-canvas');
    const slashCtx = slashCanvas.getContext('2d');
    slashCanvas.width = window.innerWidth;
    slashCanvas.height = window.innerHeight;

    // ─── Helpers ───
    const _ndcVec = new THREE.Vector2();
    function clientToNDC(clientX, clientY, out) {
      const v = out || _ndcVec;
      v.set((clientX / window.innerWidth) * 2 - 1, -(clientY / window.innerHeight) * 2 + 1);
      return v;
    }

    function computeSlicePlane(startNDC, endNDC, hitObjects) {
      const sliceDir3D = new THREE.Vector3(
        endNDC.x - startNDC.x, endNDC.y - startNDC.y, 0
      ).normalize();
      const planeNormal = new THREE.Vector3(-sliceDir3D.y, sliceDir3D.x, 0).normalize();
      planeNormal.applyQuaternion(camera.quaternion.clone());

      // Raycast midpoint to find where the cut plane should pass through
      let planeOffset = 0;
      if (hitObjects && hitObjects.length > 0) {
        const midNDC = new THREE.Vector2(
          (startNDC.x + endNDC.x) / 2,
          (startNDC.y + endNDC.y) / 2
        );
        raycaster.setFromCamera(midNDC, camera);
        const intersects = raycaster.intersectObjects(hitObjects, true);
        if (intersects.length > 0) {
          planeOffset = -planeNormal.dot(intersects[0].point);
        }
      }

      return { normal: planeNormal, offset: planeOffset };
    }

    function disposeGroup(group) {
      scene.remove(group);
      group.traverse(child => {
        if (child.isMesh) { child.geometry.dispose(); child.material.dispose(); }
      });
    }

    function trailHitsObjects(trail, objects) {
      for (let i = 0; i < trail.length; i += Math.max(1, Math.floor(trail.length / 10))) {
        const ndc = clientToNDC(trail[i].x, trail[i].y);
        raycaster.setFromCamera(ndc, camera);
        if (raycaster.intersectObjects(objects, true).length > 0) return true;
      }
      return false;
    }

    // ─── State ───
    let currentFruitType = 'apple';
    let currentFruitGroup = null;
    let slicedPieces = [];
    let particles = [];
    let isSlicing = false;
    let sliceStart = new THREE.Vector2();
    let sliceEnd = new THREE.Vector2();
    let sliceTrail = [];
    let score = 0;
    let clock = new THREE.Clock();
    const audio = new ASMRAudio();
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let isFirstSlice = true;
    let zoomAnimating = false;

    // ─── Particle System ───
    class GlassParticle {
      constructor(position, color, velocity) {
        const size = 0.02 + Math.random() * 0.06;
        const geo = Math.random() > 0.5
          ? new THREE.TetrahedronGeometry(size)
          : new THREE.BoxGeometry(size, size * 0.3, size * 0.7);

        const mat = new THREE.MeshPhysicalMaterial({
          color: color,
          transparent: true,
          opacity: 0.8,
          roughness: 0.1,
          metalness: 0.1,
          transmission: 0.5,
        });

        this.mesh = new THREE.Mesh(geo, mat);
        this.mesh.renderOrder = 10; // render on top of glass fruit
        this.mesh.position.copy(position);
        this.mesh.rotation.set(
          Math.random() * Math.PI,
          Math.random() * Math.PI,
          Math.random() * Math.PI
        );

        this.velocity = velocity.clone();
        this.angularVel = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        );
        this.maxLife = 2.0 + Math.random(); // 2~3s lifespan
        this.age = 0;

        scene.add(this.mesh);
      }

      update(dt) {
        this.age += dt;
        if (this.age >= this.maxLife) return false;

        this.velocity.y -= 1.5 * dt; // gentle gravity
        // Decelerate over time
        this.velocity.multiplyScalar(1 - 0.5 * dt);
        this.mesh.position.addScaledVector(this.velocity, dt);
        this.mesh.rotation.x += this.angularVel.x * dt;
        this.mesh.rotation.y += this.angularVel.y * dt;
        this.mesh.rotation.z += this.angularVel.z * dt;

        // Fade out over lifetime
        const life = 1 - this.age / this.maxLife;
        this.mesh.material.opacity = Math.max(0, life * 0.8);

        // Quiet tinkle at random point
        if (!this.tinkled && this.age > 0.3 + Math.random() * 0.5) {
          this.tinkled = true;
          audio.playShardLand();
        }

        return true;
      }

      dispose() {
        scene.remove(this.mesh);
        this.mesh.geometry.dispose();
        this.mesh.material.dispose();
      }
    }

    function spawnParticles(position, color, normal, count = 20) {
      for (let i = 0; i < count; i++) {
        // Offset spawn position far along normal to avoid spawning inside fruit
        const side = Math.random() > 0.5 ? 1 : -1;
        const spawnPos = position.clone().addScaledVector(normal, side * (0.3 + Math.random() * 0.2));
        // Also add random surface-tangent offset
        const tangent = new THREE.Vector3(
          (Math.random() - 0.5), (Math.random() - 0.5), (Math.random() - 0.5)
        ).cross(normal).normalize();
        spawnPos.addScaledVector(tangent, (Math.random() - 0.5) * 0.3);

        const speed = 0.8 + Math.random() * 1.0;
        const spread = new THREE.Vector3(
          (Math.random() - 0.5) * 0.4,
          Math.random() * 0.5,
          (Math.random() - 0.5) * 0.4
        );
        // Strong outward velocity along normal direction
        const dir = normal.clone().multiplyScalar(side * speed).add(spread);
        particles.push(new GlassParticle(spawnPos, color, dir));
      }
    }

    // ─── Fruit Creation ───
    function createGlassMaterial(fruitDef) {
      return new THREE.ShaderMaterial({
        vertexShader: glassVertexShader,
        fragmentShader: glassFragmentShader,
        uniforms: {
          uColor: { value: fruitDef.color },
          uOpacity: { value: 0.35 },
          uFresnelPower: { value: 3.0 },
          uTime: { value: 0 },
        },
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
    }

    let spawnAnimId = null;

    function createFruit(type) {
      // Cancel any in-progress spawn animation
      if (spawnAnimId) { cancelAnimationFrame(spawnAnimId); spawnAnimId = null; }

      // Remove existing
      if (currentFruitGroup) disposeGroup(currentFruitGroup);
      // Remove sliced pieces
      slicedPieces.forEach(p => disposeGroup(p.group));
      slicedPieces = [];

      const fruitDef = FRUITS[type];
      const group = new THREE.Group();

      if (fruitDef.cluster) {
        // Grape cluster
        const positions = [];
        for (let i = 0; i < fruitDef.clusterCount; i++) {
          const angle = (i / fruitDef.clusterCount) * Math.PI * 2;
          const layer = Math.floor(i / 4);
          const r = 0.5 - layer * 0.1;
          positions.push(new THREE.Vector3(
            Math.cos(angle + layer) * r,
            -layer * 0.4 + 0.4,
            Math.sin(angle + layer) * r
          ));
        }
        positions.forEach(pos => {
          const geo = fruitDef.geometry();
          const mat = createGlassMaterial(fruitDef);
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.copy(pos);
          mesh.scale.setScalar(fruitDef.size);
          mesh.userData.fruitType = type;
          group.add(mesh);
        });
      } else {
        const geo = fruitDef.geometry();
        const mat = createGlassMaterial(fruitDef);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.scale.setScalar(fruitDef.size);
        mesh.userData.fruitType = type;
        group.add(mesh);
      }

      // Subtle stem for apple/strawberry
      if (type === 'apple' || type === 'strawberry') {
        const stemGeo = new THREE.CylinderGeometry(0.03, 0.04, 0.25, 8);
        const stemMat = new THREE.MeshStandardMaterial({
          color: 0x334422,
          roughness: 0.8,
        });
        const stem = new THREE.Mesh(stemGeo, stemMat);
        stem.position.y = fruitDef.size * (type === 'strawberry' ? 0.7 : 1.0);
        group.add(stem);
      }

      group.position.y = 0.3;
      group.scale.setScalar(0);
      scene.add(group);
      currentFruitGroup = group;

      // Spawn animation (§11.1): scale 0→1, y+0.3→0 over 0.4s ease-out
      const spawnStart = performance.now();
      function animateSpawn() {
        const t = Math.min((performance.now() - spawnStart) / 400, 1);
        if (currentFruitGroup !== group) return; // guard: fruit was replaced
        const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
        group.scale.setScalar(ease);
        group.position.y = 0.3 * (1 - ease);
        if (t < 1) spawnAnimId = requestAnimationFrame(animateSpawn);
        else spawnAnimId = null;
      }
      spawnAnimId = requestAnimationFrame(animateSpawn);

      // Spawn sound
      audio.playSpawn(type);
    }

    // ─── Zoom-in animation (§7.5) ───
    function animateZoomIn() {
      if (zoomAnimating) return;
      zoomAnimating = true;
      controls.enabled = false;
      const startFOV = 55;
      const targetFOV = 45;
      const zoomStart = performance.now();

      function zoomStep() {
        const elapsed = performance.now() - zoomStart;
        if (elapsed < 500) {
          // Zoom in over 0.5s
          const t = elapsed / 500;
          camera.fov = startFOV + (targetFOV - startFOV) * t;
          camera.updateProjectionMatrix();
          requestAnimationFrame(zoomStep);
        } else if (elapsed < 1500) {
          // Hold for 1s — FOV already set, no update needed
          requestAnimationFrame(zoomStep);
        } else if (elapsed < 2000) {
          // Zoom back over 0.5s
          const t = (elapsed - 1500) / 500;
          camera.fov = targetFOV + (startFOV - targetFOV) * t;
          camera.updateProjectionMatrix();
          requestAnimationFrame(zoomStep);
        } else {
          camera.fov = startFOV;
          camera.updateProjectionMatrix();
          zoomAnimating = false;
          controls.enabled = true;
        }
      }
      zoomStep();
    }

    // ─── Tap interaction (§6) ───
    function handleTap(e) {
      raycaster.setFromCamera(clientToNDC(e.clientX, e.clientY), camera);

      // Check hit on main fruit
      if (currentFruitGroup) {
        const intersects = raycaster.intersectObjects(currentFruitGroup.children, true);
        if (intersects.length > 0) {
          audio.playTap(currentFruitType);

          // Scale pulse effect (§6.2): squish then restore over 50ms
          const origScale = currentFruitGroup.scale.clone();
          const tapDir = intersects[0].face ? intersects[0].face.normal.clone() : new THREE.Vector3(1,0,0);
          currentFruitGroup.scale.set(
            origScale.x * (1 - Math.abs(tapDir.x) * 0.08),
            origScale.y * (1 - Math.abs(tapDir.y) * 0.08),
            origScale.z * (1 - Math.abs(tapDir.z) * 0.08)
          );
          setTimeout(() => {
            if (currentFruitGroup) currentFruitGroup.scale.copy(origScale);
          }, 50);

          // Ripple effect — add a temporary ring at tap point
          const hitPoint = intersects[0].point;
          const rippleGeo = new THREE.RingGeometry(0, 0.3, 32);
          const rippleMat = new THREE.MeshBasicMaterial({
            color: 0xffffff, transparent: true, opacity: 0.4, side: THREE.DoubleSide
          });
          const ripple = new THREE.Mesh(rippleGeo, rippleMat);
          ripple.position.copy(hitPoint);
          ripple.lookAt(hitPoint.clone().add(intersects[0].face.normal));
          scene.add(ripple);
          const rippleStart = performance.now();
          function animRipple() {
            const t = (performance.now() - rippleStart) / 400;
            if (t > 1) { scene.remove(ripple); rippleGeo.dispose(); rippleMat.dispose(); return; }
            const s = 1 + t * 2;
            ripple.scale.setScalar(s);
            rippleMat.opacity = 0.4 * (1 - t);
            requestAnimationFrame(animRipple);
          }
          animRipple();
        }
      }
    }

    // ─── Mesh Slicing (§7) ───
    function createSlicedHalves(meshesToSlice, planeNormal, planeOffset, fruitDef, isReSlice, sourceSliceCount) {
      const newPieces = [];
      const sliceCount = (sourceSliceCount || 0) + 1;
      const particleCount = isReSlice ? 15 : 30;

      meshesToSlice.forEach(mesh => {
        const worldPos = new THREE.Vector3();
        mesh.getWorldPosition(worldPos);
        const worldScale = new THREE.Vector3();
        mesh.getWorldScale(worldScale);

        for (let side = 0; side < 2; side++) {
          const cloneGeo = mesh.geometry.clone();
          const normal = side === 0 ? planeNormal.clone() : planeNormal.clone().negate();

          const capGroup = new THREE.Group();

          // Collect all clipping planes from source material
          const existingPlanes = mesh.material.clippingPlanes
            ? mesh.material.clippingPlanes.map(p => p.clone())
            : [];

          const halfMat = new THREE.ShaderMaterial({
            vertexShader: glassVertexShader,
            fragmentShader: glassFragmentShader,
            uniforms: {
              uColor: { value: fruitDef.color.clone() },
              uOpacity: { value: 0.35 },
              uFresnelPower: { value: 3.0 },
              uTime: { value: 0 },
            },
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,
            clipping: true,
            clippingPlanes: [...existingPlanes, new THREE.Plane(normal, (planeOffset !== 0 ? planeOffset : -normal.dot(worldPos)) + 0.01 * (side === 0 ? 1 : -1))],
          });

          const halfMesh = new THREE.Mesh(cloneGeo, halfMat);
          halfMesh.position.copy(worldPos);
          halfMesh.scale.copy(worldScale);
          halfMesh.userData.fruitType = currentFruitType;
          halfMesh.userData.sliceCount = sliceCount;

          // Cross-section disc
          const capGeo = new THREE.CircleGeometry(worldScale.x * 1.2, 48);
          const capMat = new THREE.ShaderMaterial({
            vertexShader: capVertexShader,
            fragmentShader: crossSectionFragShader,
            uniforms: {
              uInnerColor: { value: fruitDef.innerColor },
              uTime: { value: 0 },
            },
            transparent: true,
            side: THREE.DoubleSide,
          });

          const capMesh = new THREE.Mesh(capGeo, capMat);
          // Position cap at the actual cut point (plane intersection with fruit)
          const distToPlane = planeNormal.dot(worldPos) + (planeOffset !== 0 ? planeOffset : -planeNormal.dot(worldPos));
          const capPos = worldPos.clone().sub(planeNormal.clone().multiplyScalar(distToPlane));
          capMesh.position.copy(capPos);
          capMesh.lookAt(capPos.clone().add(planeNormal));

          capGroup.add(halfMesh);
          capGroup.add(capMesh);
          scene.add(capGroup);

          const pushDir = side === 0 ? planeNormal.clone() : planeNormal.clone().negate();
          newPieces.push({
            group: capGroup,
            velocity: pushDir.multiplyScalar(2.0 + Math.random() * 0.8), // strong separation
            separationTime: 0, // tracks ease-out progress
            materials: [halfMat, capMat],
            sliceCount: sliceCount,
            sliceable: worldScale.x > 0.3, // too small = no more slicing
          });
        }

        spawnParticles(worldPos, fruitDef.color, planeNormal, particleCount);
      });

      return newPieces;
    }

    function sliceFruit(startNDC, endNDC) {
      if (!currentFruitGroup) return;

      // Check hit on main fruit
      let hitFruit = false;
      const meshesToSlice = [];
      currentFruitGroup.traverse(child => {
        if (child.isMesh && child.userData.fruitType) {
          meshesToSlice.push(child);
          hitFruit = true;
        }
      });

      if (!hitFruit) return;

      const { normal: planeNormal, offset: planeOffset } = computeSlicePlane(startNDC, endNDC, meshesToSlice);
      const fruitDef = FRUITS[currentFruitType];
      const speed = startNDC.distanceTo(endNDC) * 5;
      audio.playSlice(speed, currentFruitType);

      const newPieces = createSlicedHalves(meshesToSlice, planeNormal, planeOffset, fruitDef, false, 0);
      slicedPieces.push(...newPieces);

      // Remove original fruit
      disposeGroup(currentFruitGroup);
      currentFruitGroup = null;

      score++;
      document.getElementById('score').textContent = score;
      hideHint();

      // Zoom-in on first slice only (§7.5)
      if (isFirstSlice) {
        isFirstSlice = false;
        animateZoomIn();
      }

    }

    // Re-slice a sliced piece (§7.3)
    function reSlicePiece(piece, startNDC, endNDC) {
      if (!piece.sliceable) return false;

      const fruitDef = FRUITS[currentFruitType];

      // Find the fruit mesh in this piece's group
      const meshesToSlice = [];
      piece.group.traverse(child => {
        if (child.isMesh && child.userData.fruitType) {
          meshesToSlice.push(child);
        }
      });
      if (meshesToSlice.length === 0) return false;

      const { normal: planeNormal, offset: planeOffset } = computeSlicePlane(startNDC, endNDC, meshesToSlice);

      // Play sound at reduced volume for re-slice (§7.3)
      audio.playSlice(startNDC.distanceTo(endNDC) * 5, currentFruitType, 0.7);

      const newPieces = createSlicedHalves(meshesToSlice, planeNormal, planeOffset, fruitDef, true, piece.sliceCount);
      slicedPieces.push(...newPieces);

      // Remove the original piece
      disposeGroup(piece.group);

      // Mark for removal
      piece.removed = true;
      slicedPieces = slicedPieces.filter(p => !p.removed);

      score++;
      document.getElementById('score').textContent = score;

      return true;
    }


    // ─── Input Handling ───
    const cursor = document.getElementById('custom-cursor');

    function onPointerMove(e) {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      if (isSlicing) {
        sliceTrail.push({ x: e.clientX, y: e.clientY, time: Date.now() });
      }

      clientToNDC(e.clientX, e.clientY, mouse);
    }

    function onPointerDown(e) {
      if (e.target.closest('.fruit-btn')) return;

      isSlicing = true;
      clientToNDC(e.clientX, e.clientY, sliceStart);
      sliceTrail = [{ x: e.clientX, y: e.clientY, time: Date.now() }];
      cursor.classList.add('slicing');
      controls.enabled = false;

      // Init audio on first interaction
      audio.init().then(() => audio.playAmbient());
    }

    function onPointerUp(e) {
      if (!isSlicing) return;
      isSlicing = false;
      cursor.classList.remove('slicing');
      controls.enabled = true;

      clientToNDC(e.clientX, e.clientY, sliceEnd);

      const dist = sliceStart.distanceTo(sliceEnd);

      // Tap detection (§6): NDC distance ≤ 0.1 → tap
      if (dist <= 0.1) {
        handleTap(e);
        setTimeout(() => { sliceTrail = []; }, 300);
        return;
      }

      // Slice detection (§7.1): NDC distance > 0.1
      if (dist > 0.1) {
        if (currentFruitGroup && trailHitsObjects(sliceTrail, currentFruitGroup.children)) {
          sliceFruit(sliceStart, sliceEnd);
        } else {
          // Check re-slice on sliced pieces (§7.3)
          for (const piece of slicedPieces) {
            if (!piece.sliceable) continue;
            if (trailHitsObjects(sliceTrail, piece.group.children)) {
              reSlicePiece(piece, sliceStart, sliceEnd);
              break;
            }
          }
        }
      }

      // Fade slash trail — clear after 150ms and force canvas clear
      setTimeout(() => {
        sliceTrail = [];
        slashCtx.clearRect(0, 0, slashCanvas.width, slashCanvas.height);
      }, 150);
    }

    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointerup', onPointerUp);

    // ─── Fruit Selector ───
    document.querySelectorAll('.fruit-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.fruit-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFruitType = btn.dataset.fruit;
        isFirstSlice = true;
        createFruit(currentFruitType);
      });
    });

    // ─── Animation Loop ───
    function drawSlashTrail() {
      slashCtx.clearRect(0, 0, slashCanvas.width, slashCanvas.height);

      if (sliceTrail.length < 2) return;

      const now = Date.now();
      // Prune entries older than 150ms for fast fade
      while (sliceTrail.length > 0 && (now - sliceTrail[0].time) > 150) sliceTrail.shift();
      if (sliceTrail.length < 2) return;

      slashCtx.lineCap = 'round';
      slashCtx.lineJoin = 'round';

      for (let i = 1; i < sliceTrail.length; i++) {
        const age = (now - sliceTrail[i].time) / 150;
        if (age > 1) continue;

        const alpha = (1 - age) * 0.8;
        const width = (1 - age) * 4 + 1;

        slashCtx.beginPath();
        slashCtx.strokeStyle = `rgba(255, 220, 220, ${alpha})`;
        slashCtx.lineWidth = width;
        slashCtx.moveTo(sliceTrail[i-1].x, sliceTrail[i-1].y);
        slashCtx.lineTo(sliceTrail[i].x, sliceTrail[i].y);
        slashCtx.stroke();

        // Glow
        slashCtx.strokeStyle = `rgba(255, 150, 150, ${alpha * 0.3})`;
        slashCtx.lineWidth = width + 8;
        slashCtx.stroke();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.getElapsedTime();

      controls.update();

      // Update fruit rotation
      if (currentFruitGroup) {
        currentFruitGroup.rotation.y += dt * 0.3;
        // Floating animation
        currentFruitGroup.position.y = Math.sin(elapsed * 0.8) * 0.15;

        // Update shader time
        currentFruitGroup.traverse(child => {
          if (child.isMesh && child.material.uniforms) {
            child.material.uniforms.uTime.value = elapsed;
          }
        });
      }

      // Update sliced pieces — separation with gravity then fade
      slicedPieces.forEach(piece => {
        piece.separationTime += dt;

        if (piece.separationTime < 1.0) {
          // Phase 1: ease-out separation (0–1.0s) with gravity
          const t = Math.min(piece.separationTime / 1.0, 1);
          const easeOut = 1 - (1 - t) * (1 - t);
          const factor = 1 - easeOut;
          piece.group.position.addScaledVector(piece.velocity, dt * factor);
          // Add gentle gravity for falling effect
          piece.group.position.y -= 0.8 * dt * piece.separationTime;
        }

        // Update time uniforms
        piece.materials.forEach(mat => {
          if (mat.uniforms.uTime) mat.uniforms.uTime.value = elapsed;
        });
      });

      // Update particles
      particles = particles.filter(p => {
        if (!p.update(dt)) {
          p.dispose();
          return false;
        }
        return true;
      });

      // Draw slash trail
      drawSlashTrail();

      renderer.render(scene, camera);
    }

    // ─── Init ───
    createFruit(currentFruitType);
    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      slashCanvas.width = window.innerWidth;
      slashCanvas.height = window.innerHeight;
    });

    // Hide hint after first successful slice
    const hint = document.getElementById('hint');
    let hintHidden = false;
    function hideHint() {
      if (!hintHidden) {
        hintHidden = true;
        hint.style.animation = 'none';
        hint.style.transition = 'opacity 1s';
        hint.style.opacity = '0';
      }
    }
  </script>
</body>
</html>
